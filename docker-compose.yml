version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: employiq-postgres
    restart: always
    environment:
      POSTGRES_USER: employiq_user
      POSTGRES_PASSWORD: employiq_password
      POSTGRES_DB: employiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employiq_user -d employiq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: employiq-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: employiq-ai-service
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ENVIRONMENT=development
    volumes:
      - ./ai-service:/app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: employiq-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://employiq_user:employiq_password@postgres:5432/employiq_db?schema=public
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=employiq_super_secret_jwt_key_2026
      - JWT_REFRESH_SECRET=employiq_super_secret_refresh_jwt_key_2026
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
